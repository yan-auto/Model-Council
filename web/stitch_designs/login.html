<script type="module">
  import { listProviders } from '../src/api.js';

  // 已登录 → 直接跳转
  if (sessionStorage.getItem('council_logged_in') === 'true') {
    window.location.href = '/chat';
  }

  // 登录表单提交
  const form = document.getElementById('login-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (!email || !password) return;

    const submitBtn = form.querySelector('[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';

    // 强制 8 秒超时，无论如何都要跳转
    const deadline = setTimeout(() => {
      sessionStorage.setItem('council_logged_in', 'true');
      window.location.href = '/setup';
    }, 8000);

    try {
      let hasProviders = false;
      try {
        const data = await listProviders();
        hasProviders = data.providers && data.providers.length > 0;
      } catch (apiErr) {
        hasProviders = false;
      }

      clearTimeout(deadline);
      sessionStorage.setItem('council_logged_in', 'true');
      window.location.href = hasProviders ? '/chat' : '/setup';
    } catch (err) {
      clearTimeout(deadline);
      sessionStorage.setItem('council_logged_in', 'true');
      window.location.href = '/setup';
    }
  });
</script>
