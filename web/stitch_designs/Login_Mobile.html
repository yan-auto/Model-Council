<body class="bg-surface font-body text-on-surface flex flex-col min-h-screen">
<!-- Auth Container -->
<main class="flex-grow flex flex-col items-center justify-center p-6 relative overflow-hidden">

<div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-primary-fixed/20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-80 h-80 bg-secondary-fixed/30 rounded-full blur-[120px]"></div>
<!-- Login Card -->
<div class="w-full max-w-md glass-panel p-8 rounded-lg shadow-2xl shadow-on-surface/[0.06] border border-outline-variant/15 relative z-10">
<!-- Logo Section -->
<header class="flex flex-col items-center mb-10">
<div class="mb-4 flex items-center justify-center w-14 h-14 rounded-2xl bg-primary text-on-primary">
<span class="material-symbols-outlined !text-3xl" data-icon="terminal">terminal</span>
</div>
<h1 class="font-headline text-3xl font-bold tracking-tight text-on-surface">Council</h1>
<p class="font-label text-xs uppercase tracking-[0.2em] text-secondary mt-2">Privacy First AI Infrastructure</p>
</header>
<!-- Form Section -->
<form class="space-y-6">
<div class="space-y-4">
<!-- Email Input -->
<div class="group">
<label class="block font-label text-[11px] font-bold uppercase tracking-wider text-secondary mb-2 ml-1" for="email">Work Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border-0 rounded-full py-4 pl-12 pr-6 text-on-surface focus:ring-2 focus:ring-primary-container/20 focus:bg-surface-container-high transition-all duration-200 placeholder:text-outline/60" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Passphrase Input -->
<div class="group">
<label class="block font-label text-[11px] font-bold uppercase tracking-wider text-secondary mb-2 ml-1" for="passphrase">Passphrase</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="key">key</span>
<input class="w-full bg-surface-container-low border-0 rounded-full py-4 pl-12 pr-12 text-on-surface focus:ring-2 focus:ring-primary-container/20 focus:bg-surface-container-high transition-all duration-200 placeholder:text-outline/60" id="passphrase" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200 font-headline text-lg tracking-tight" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
<span class="px-4 font-label text-[10px] uppercase tracking-widest text-secondary font-medium">Identity Provider</span>
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-low border border-outline-variant/10 py-3.5 rounded-full hover:bg-surface-container-high transition-colors active:scale-[0.97]">

<span class="font-label text-sm font-semibold text-on-surface-variant">GitHub</span>
</button>
</div>
<!-- Footer Link -->

<a class="font-label text-xs font-semibold text-secondary hover:text-primary transition-colors flex items-center justify-center gap-2 group" href="#">
                    Request Access

</a>

</div>

<a class="font-label text-[10px] uppercase tracking-widest text-outline hover:text-secondary transition-colors" href="#">Security</a>
